<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Favicon C++ Neon Course">
  <defs>
    <!-- Deep space background -->
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Neon gradient for the C text -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <!-- Neon glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Squircle -->
  <rect width="128" height="128" rx="32" fill="url(#bgGlow)"/>

  <!-- Subtle grid pattern in the background for developer aesthetic -->
  <path d="M0 32h128 M0 64h128 M0 96h128 M32 0v128 M64 0v128 M96 0v128" stroke="rgba(255,255,255,0.03)" stroke-width="2"/>

  <!-- The "C" (Modern Geometric Rounded Square) -->
  <path 
    d="M 56 36 L 36 36 A 16 16 0 0 0 20 52 L 20 76 A 16 16 0 0 0 36 92 L 56 92" 
    fill="none" 
    stroke="url(#neonGradient)" 
    stroke-width="14" 
    stroke-linecap="round" 
    filter="url(#glow)" 
  />

  <!-- First Plus (Staggered up) -->
  <path d="M 76 46 L 76 70 M 64 58 L 88 58" 
    fill="none" 
    stroke="#38bdf8"
    stroke-width="11" 
    stroke-linecap="round" 
    filter="url(#glow)" 
  />

  <!-- Second Plus (Staggered down) -->
  <path d="M 104 62 L 104 86 M 92 74 L 116 74" 
    fill="none" 
    stroke="#c084fc"
    stroke-width="11" 
    stroke-linecap="round" 
    filter="url(#glow)" 
  />
</svg>
